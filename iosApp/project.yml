name: iosApp

options:
  bundleIdPrefix: com.example.kmptemplate
  deploymentTarget:
    iOS: "17.6"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true

configs:
  Debug: debug
  Mock: debug
  Release: release

configFiles:
  Debug: Configuration/Debug.xcconfig
  Mock: Configuration/Mock.xcconfig
  Release: Configuration/Config.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"

packages:
  HSMacro:
    url: https://github.com/HShotaro/HSMacro.git
    from: "1.1.0"

fileGroups:
  - iosAppUITests.xctestplan
  - iosAppTests.xctestplan

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
        iosAppUITests: testing
    run:
      config: Debug
    test:
      config: Debug
      testPlans:
        - path: iosAppUITests.xctestplan
          defaultPlan: true
  iosApp-Mock:
    build:
      targets:
        iosApp: all
        iosAppTests: testing
        iosAppUITests: testing
    run:
      config: Mock
    test:
      config: Mock
      testPlans:
        - path: iosAppTests.xctestplan
          defaultPlan: true
        - path: iosAppUITests.xctestplan

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "17.6"
    sources:
      - path: iosApp
        excludes:
          - Info.plist
          - Preview Content
    configFiles:
      Debug: Configuration/Debug.xcconfig
      Mock: Configuration/Mock.xcconfig
      Release: Configuration/Config.xcconfig
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: $(TEAM_ID)
        PROVISIONING_PROFILE_SPECIFIER: $(PROVISIONING_PROFILE_SPECIFIER)
        INFOPLIST_FILE: iosApp/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        DEVELOPMENT_ASSET_PATHS: "\"iosApp/Preview Content\""
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
    dependencies:
      - package: HSMacro
    preBuildScripts:
      - name: Compile Kotlin Framework
        script: |
          cd "$SRCROOT/.."
          make ios-embed
        basedOnDependencyAnalysis: false

  iosAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.6"
    sources:
      - path: iosAppTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: iosAppTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/$(PRODUCT_NAME)"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: iosApp

  iosAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.6"
    sources:
      - path: iosAppUITests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TEST_TARGET_NAME: iosApp
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: iosAppUITests
    dependencies:
      - target: iosApp
